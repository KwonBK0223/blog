baseURL: "https://kwonbk0223.github.io/blog/"
title: "BK's Paper Review"
theme: "PaperMod"
defaultContentLanguage: "ko"
defaultContentLanguageInSubdir: false
enableRobotsTXT: true
buildFuture: true
pagination:
  pagerSize: 10

minify:
  disableXML: true

outputs:
  home: [HTML, RSS, JSON]

params:
  env: production
  description: "AI 논문 리뷰 블로그"
  defaultTheme: auto
  ShowReadingTime: false
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true
  TocOpen: false
  math: true
  goatcounter: "house9895"

languages:
  ko:
    languageName: "한국어"
    languageCode: "ko-kr"
    weight: 1
    params:
      homeInfoParams:
        Title: "BK's Paper Review"
        Content: |
          AI 논문 리뷰를 기록하는 공간입니다.

          **[Federated Learning](series/federated-learning/)** · **[Federated Learning Applications](series/federated-learning-applications/)** · **[Medical AI](series/medical-ai/)** · **[AI Algorithms](series/ai-algorithms/)** · **[AI Applications](series/ai-applications/)** · **[Security](series/security/)**
    menu:
      main:
        - identifier: archives
          name: Archive
          url: /archives/
          weight: 10
        - identifier: series
          name: Series
          url: /series/
          weight: 15
        - identifier: tags
          name: Tags
          url: /tags/
          weight: 20
        - identifier: search
          name: Search
          url: /search/
          weight: 30
        - identifier: personal
          name: Personal Site ↗
          url: "https://kwonbk0223.github.io/"
          weight: 40
  en:
    languageName: "English"
    languageCode: "en-us"
    weight: 2
    params:
      homeInfoParams:
        Title: "BK's Paper Review"
        Content: |
          A space for recording AI paper reviews.

          **[Federated Learning](series/federated-learning/)** · **[Federated Learning Applications](series/federated-learning-applications/)** · **[Medical AI](series/medical-ai/)** · **[AI Algorithms](series/ai-algorithms/)** · **[AI Applications](series/ai-applications/)** · **[Security](series/security/)**
    menu:
      main:
        - identifier: archives
          name: Archive
          url: /archives/
          weight: 10
        - identifier: series
          name: Series
          url: /series/
          weight: 15
        - identifier: tags
          name: Tags
          url: /tags/
          weight: 20
        - identifier: search
          name: Search
          url: /search/
          weight: 30
        - identifier: personal
          name: Personal Site ↗
          url: "https://kwonbk0223.github.io/"
          weight: 40

taxonomies:
  category: categories
  tag: tags
  series: series

markup:
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        enable: true
        delimiters:
          block: [['\[', '\]'], ['$$', '$$']]
          inline: [['\(', '\)'], ['$', '$']]
  highlight:
    noClasses: false
    style: monokai
