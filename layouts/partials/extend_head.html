{{ if or .Params.math .Site.Params.math }}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
  onload="renderMathInElement(document.body, {delimiters: [
    {left: '$$', right: '$$', display: true},
    {left: '$', right: '$', display: false},
    {left: '\\(', right: '\\)', display: false},
    {left: '\\[', right: '\\]', display: true}
  ], throwOnError: false});"></script>
{{ end }}

{{ if .Site.Params.goatcounter }}
<script data-goatcounter="https://{{ .Site.Params.goatcounter }}.goatcounter.com/count"
        async src="https://gc.zgo.at/count.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
  var code = {{ .Site.Params.goatcounter }};
  var isEn = document.documentElement.lang.indexOf('en') === 0;
  function fmt(c) { return c.replace(/[\s ]/g, ','); }

  // Per-post view count (post pages only)
  if (/\/posts\/.+/.test(location.pathname)) {
    var meta = document.querySelector('.post-single .post-meta');
    if (meta) {
      fetch('https://' + code + '.goatcounter.com/counter/' + encodeURIComponent(location.pathname) + '.json')
        .then(function (r) { return r.json().catch(function () { return null; }); })
        .then(function (d) {
          if (!d || d.count === undefined) return;
          var s = document.createElement('span');
          s.textContent = ' · 👁 ' + fmt(d.count) + (isEn ? ' views' : '회');
          meta.appendChild(s);
        }).catch(function () {});
    }
  }

});
</script>
{{ end }}
